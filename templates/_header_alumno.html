<header class="main-header">
    <nav class="container header-nav">
        <div class="nav-left-group">
            <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Smartquiz Logo" class="site-logo">
        </div>
        <div class="nav-right-group">
            <div class="nav-links">
                <a href="{{ url_for('inicioAlumno') }}" class="nav-button active">Inicio</a>
                <a href="#" class="nav-button">Explorar Quizzes</a>
            </div>
            <a href="{{ url_for('unirse') }}">
                <button class="btn-join-game">
                    <svg ...>...</svg> Unirse a un juego
                </button>
            </a>
            <div class="profile-container">
                <img src="{{ url_for('static', filename='img/avatar_placeholder.png') }}" alt="Avatar del usuario" class="user-avatar" id="avatar-button">
                <div class="profile-dropdown hidden" id="profile-menu">
                    <div class="dropdown-header">
                        <span class="username">{{ current_user.username }}</span>
                        <span class="user-role">{{ current_user.rol|capitalize }}</span>
                    </div>
                    <a href="{{ url_for('miPerfil') }}">Mi perfil</a>
                    <a href="{{ url_for('logout') }}">Salir</a>
                </div>
            </div>
        </div>
    </nav>
</header>
