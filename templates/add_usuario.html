{% extends "layout.html" %} 
{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header">
                    <h2>Agregar Nuevo Usuario</h2>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('crear_usuario') }}" method="post">

                        <div class="form-group mb-3">
                            <label for="nombres">Nombres:</label>
                            <input type="text" id="nombres" name="nombres" class="form-control" required>
                        </div>

                        <div class="form-group mb-3">
                            <label for="apellidos">Apellidos:</label>
                            <input type="text" id="apellidos" name="apellidos" class="form-control" required>
                        </div>

                        <div class="form-group mb-3">
                            <label for="username">Nombre de Usuario (Username):</label>
                            <input type="text" id="username" name="username" class="form-control" required>
                        </div>

                        <div class="form-group mb-3">
                            <label for="email">Correo Electrónico:</label>
                            <input type="email" id="email" name="email" class="form-control" required>
                        </div>

                        <div class="form-group mb-3">
                            <label for="password">Contraseña:</label>
                            <input type="password" id="password" name="password" class="form-control" required>
                        </div>

                        <div class="form-group mb-3">
                            <label for="rol">Rol:</label>
                            <select id="rol" name="rol" class="form-control">
                                <option value="alumno">Alumno</option>
                                <option value="profesor">Profesor</option>
                                <option value="admin">Admin</option> </select>
                        </div>

                        <button type="submit" class="btn btn-primary" onclick="return confirm('¿Estás seguro de que quieres crear este nuevo usuario?');">Guardar Usuario</button>
                        <a href="{{ url_for('listar_usuarios') }}" class="btn btn-secondary">Cancelar</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
