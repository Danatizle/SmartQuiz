{% extends "layout.html" %} 
{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header">
                    <h2>Editar Usuario: {{ usuario.nombres }} {{ usuario.apellidos }}</h2>
                </div>
                <div class="card-body">
                    <form action="{{ url_for('actualizar_usuario', id_usuario=usuario.id_usuario) }}" method="post">

                        <div class="form-group mb-3">
                            <label for="nombres">Nombres:</label>
                            <input type="text" id="nombres" name="nombres" class="form-control" value="{{ usuario.nombres }}" required>
                        </div>

                        <div class="form-group mb-3">
                            <label for="apellidos">Apellidos:</label>
                            <input type="text" id="apellidos" name="apellidos" class="form-control" value="{{ usuario.apellidos }}" required>
                        </div>

                        <div class="form-group mb-3">
                            <label for="username">Nombre de Usuario (Username):</label>
                            <input type="text" id="username" name="username" class="form-control" value="{{ usuario.username }}" required>
                        </div>

                        <div class="form-group mb-3">
                            <label for="email">Correo Electrónico:</label>
                            <input type="email" id="email" name="email" class="form-control" value="{{ usuario.email }}" required>
                        </div>

                        <div class="form-group mb-3">
                            <label for="rol">Rol:</label>
                            <select id="rol" name="rol" class="form-control">
                                <option value="alumno" {% if usuario.rol == 'alumno' %}selected{% endif %}>Alumno</option>
                                <option value="profesor" {% if usuario.rol == 'profesor' %}selected{% endif %}>Profesor</option>
                                <option value="admin" {% if usuario.rol == 'admin' %}selected{% endif %}>Admin</option> </select>
                        </div>

                        <div class="alert alert-info">
                            Nota: La actualización de contraseña debe hacerse en un formulario separado por seguridad.
                        </div>

                        <button type="submit" class="btn btn-primary" onclick="return confirm('¿Estás seguro de que quieres guardar los cambios?');">Actualizar Usuario</button>
                        <a href="{{ url_for('listar_usuarios') }}" class="btn btn-secondary">Cancelar</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
