<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña - Smartquiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/inicioSesion.css') }}">
</head>
<body>
    <div class="sidebar">
        <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="Logo">
        <h1>Smartquiz</h1>
        <p>Asegura tu cuenta con una nueva contraseña</p>
    </div>

    <div class="login-container">
        <img class="user-img" src="https://cdn-icons-png.flaticon.com/512/2889/2889676.png" alt="Contraseña">
        <h2>Crear Nueva Contraseña</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash-message {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form id="changePasswordForm" action="{{ url_for('cambiar_contrasena') }}" method="POST">
            <input type="hidden" name="email" value="{{ email }}">

            <div class="form-group">
                <label for="codigo">Código de Recuperación:</label>
                <input type="text" id="codigo" name="codigo" placeholder="######" required maxlength="6">
            </div>

            <div class="form-group">
                <label for="password">Nueva Contraseña:</label>
                <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required minlength="8">
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="strength-bar-fill" id="strength-bar"></div>
                    </div>
                    <span class="strength-text" id="strength-text"></span>
                </div>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirmar Nueva Contraseña:</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Repite la contraseña" required>
            </div>

            <button type="submit" class="submit-btn">CAMBIAR CONTRASEÑA</button>
        </form>

        <p class="register-link">¿Ya recordaste? <a href="{{ url_for('login') }}">Iniciar Sesión</a></p>

    </div>

    <script src="{{ url_for('static', filename='js/cambiarContraseña.js') }}"></script>
</body>
</html>
